<h2><p class="hextel" title="Для переменных типа ture/false или цифер не нужны кавычки , но для переменных типа слов нужны двойные кавычки , иначе будет ошибка,а мы этого не хотим :)">Как писать переменные?</p>
<p class="hextel" title="Чтобы вывести текст на экран можно...нет...НУЖНО! Использовать Draw Event , в нём напишите код Draw_text(x , y , 'ваш текст') либо же Draw_text(x , y , ваша переменная)">Как выводить текст на экран?</p>
<p class="hextel" title="ВАЖНОЕ РАЗЛИЧИЕ! Для назначение обычной клавиши (букв) нужно писать keyboard_check(ord('ваша буква')) а для простых клавиш (enter , escape , space , tab) нужно писать keyboard_check(vk_enter) для обычных клавиш используется vk_ (vk_space , vk_enter , vk_tab , vk_escape) , НО! для цифр используется keyboard_check(1) (вместо один можно вставить 0,1,2,3,4,5,6 и т.д)">Как использовать клавиатуру в GML?
<p class="hextel" title="Возьмем движение персонажа , для движения можно использовать цифру (x -= 10) либо же переменную (например spd = 10) но лучше использовать переменную так как в какой то части игры можно замедлить движение (пример в collision event: spd = 5) допустим мы делаем движение объекта: keyboard_check(ord('w')) y-= spd , keyboard_check(ord('s')) y+= spd">Как изменять Y и X объекта по кнопке?</p>
<p class="hextek" title="Давайте на примере столкновения с объектом : collision event: sprite_index = sprite1 (вместо sprite1 можно поставить ваш спрайт который у вас есть) Можно использовать в разных событиях(КРОМЕ CREATE , DRAW , DESTROY для последнего просто бесполезно менять спрайт) step event: if (keyboard_check(vk_left)) {  x-= spd sprite_index = spr_player_right(или свой спрайт)  , if (keyboard_check(vk_right)) {  x+= spd sprite_index = spr_player_left(или свой спрайт) } ; alarm event: sprite_index = sprite_battle(или ваш спрайт)">Как изменять спрайт для объекта?</p>
