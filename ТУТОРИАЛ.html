<h2><p class="hexlet" title="при значении x- объект будет чуть правее (например: x-= 5 то объект сместиться влево)">как работает X в гейм мейкер?</p></h2>
<h2><p class="hexlet" title="при значении y- объект будет чуть выше (например: y-= 5 то объект сместиться вверх)">как работает Y в гейм мейкер?</p></h2>
<h2><p class="hexlet" title="Create - то что находится в объекте с самого начала (например d[0] = 'привет') ; Step - то что происходит каждые 60 кадров (тоесть каждую секунду , пример: instance_create_layer(x , y , 'instances' , object1)(и теперь объект 1 будет создаваться каждую секунду) ; Destroy - действие проиходящие при уничтожении объекта (пример: object1.can_move = true) теперь при уничтожении объекта игрок может допустим двигаться ; Draw - отвечает за отрисовку чего либо (спрайта , текста и т.д) (пример: draw_text(x , y , 'Hello, World!) ; Alarm[0 , 1 , 2 , 3 , 4 , 5 и т.д) в них происходит какое то действие через время которое нужно задать где угодно кроме draw или step (он не будет тогда работать) например в create:alarm[0] = room_speed * 4 в таком случае будильник сработает через 4 секунды (если у вас 60 фпс установлено); Collision - столкновение с каким то объектом , очень полезное событие (пример в Collision event: room_goto_next()) ">Что значат разные события в GML</p></h2>
<h2><p class="hexlet" title="Переменная это такая 'коробочка' где храняться ваши любые данные которые вы вписали (пример : can_move = true) она может отвечать за что то (пример (step event) : if (can_move = true) {  if (keyboard_check_ord()) x -= spd ,if (keyboard_check_ord()) x += spd , } ) если can_move = false то игрок не сможет управлять игроком и будет ждать когда can_move = true , так же переменная может быть в виде цифры (b = 0) или слово (b = 'RU') ">Что такое переменная?</p></h2>
