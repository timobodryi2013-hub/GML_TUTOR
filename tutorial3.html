<h2>
<p class="hextel" title="Чтобы сменить комнату нужно прописать команду room_goto(комната) либо же room_goto_next() (прописывать комнату при room_goto_next() не надо , а при room_goto() нужно) пример в событии collision: room_goto_next() ; step: if (keyboard_check_ord('z')) room_goto_next() ; alarm: room_goto_next() ; в событии CREATE и особенно DRAW НЕЛЬЗЯ ПИСАТЬ ЭТУ КОМАНДУ!">Как перемещатсья между комнатами?</p>
<p class="hextel" title="Чтобы убрать объект в комнате , в событии нужно прописать код: Instance_destroy('можно прописать объект, а можно самого себя , для другого объекта нужно прописать его название , а для самого себя не нужно прописывать') НЕЛЬЗЯ ПРОПИСЫВАТЬ В DRAW или CREATE!!! ТАК КАК ОНИ НЕ ПРЕДНАЗНАЧЕНЫ ДЛЯ ЭТОГО">Как удалить объект при каком либо действии?</p>
<p class="hextel" title="Делаем главное меню , в create создаем переменную и делаем ей значение (желательно цифрой , если напишите словом то это будет мутарно , а true/false не получиться создать меню) , ваша первая кнопка (пока на английском пишем название) и вторая кнопка ;  теперь в step : if keyboard_check_pressed(vk_down) { ваша переменная -- } if keyboard_check_pressed(vk_up) { ваша переменная ++ } if (ваша переменная >= 2 ) { ваша переменная = 1 } if (ваша переменная <= 0) { ваша переменная  = 1 ) { if (ваша переменная = 1 and keyboard_check(ord('z')) (или можете просто vk_enter) room_goto_next() (если первая кнопка у вас Start) game_end() (если первая кнопка это exit) { if (ваша переменная = 0 and keyboard_check(ord('z')) (или можете просто vk_enter) room_goto_next() (если вторая кнопка у вас Start) game_end() (если вторая кнопка это exit) ; draw_text(x , y , ваша первая кнопка)  draw_text(x , y + 40, вторая кнопка) if (ваша переменная = 1) { draw_text(x , y , '>') }  if (ваша переменная = 0) { draw_text(x , y + 40 , '>') }">Как сделать меню?</p>
<p class="hextel" title="Разлчие между if и else : if - это значить 'если' допустим : если(if) клавиша а нажата (keyboard_check(ord('a'))) переменная(допустим D) повышается на одну(++) ; else - если команда if была не правдой , пример: если(if) ты взял зонтик (допустим переменная ZONT) ты не промок (Допустим переменная SUHOI)(SUHOI = true) если ты не взял зонт (else) то ты промок (SUHOI = false)">В чем различие if и else?</p>
